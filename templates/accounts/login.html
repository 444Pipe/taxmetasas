{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4" style="color: #c1121f;">Iniciar Sesión</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                            <div class="alert alert-danger">
                                El usuario o la contraseña no son correctos. Por favor, inténtalo de nuevo.
                            </div>
                        {% endif %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Nombre de usuario</label>
                            <input type="text" name="username" class="form-control" id="id_username" required>
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" id="id_password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 rounded-3">Ingresar</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <span class="text-muted">¿No tienes una cuenta? </span>
                        <a href="{% url 'register' %}" class="text-decoration-none fw-bold" style="color: #c1121f;">Regístrate</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

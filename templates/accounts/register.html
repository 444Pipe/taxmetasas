{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4" style="color: #c1121f;">Regístrate</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-control {% if field.errors %}is-invalid{% endif %}" required>
                                {% if field.help_text %}
                                    <div class="form-text small">{{ field.help_text }}</div>
                                {% endif %}
                                {% for error in field.errors %}
                                    <div class="invalid-feedback">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 mt-3 mb-3 rounded-3">Crear Cuenta</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <span class="text-muted">¿Ya tienes una cuenta? </span>
                        <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: #c1121f;">Inicia Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
